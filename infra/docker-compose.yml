version: '3.8'

services:
  # POS System (Python/Flask + SQLite)
  pos:
    image: python:3.11-slim
    container_name: admin-panel-pos
    restart: always
    working_dir: /app/apps/api/src
    volumes:
      - .:/app
    ports:
      - "3001:3001"
    command: >
      bash -c "pip install flask -q && python3 server.py"
    environment:
      - PORT=3001

  # n8n para automatizaciones futuras
  n8n:
    image: n8nio/n8n:latest
    container_name: admin-panel-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
